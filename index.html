<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Лиды — KiberOne Kaliningrad</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap');

        :root {
            --bg: #0b0e1a;
            --surface: #131728;
            --surface2: #1a1f38;
            --border: #252b4a;
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --green: #22d3a3;
            --red: #f43f5e;
            --yellow: #fbbf24;
            --text: #e8ecff;
            --muted: #6b7280
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(79, 110, 247, .04)1px, transparent 1px), linear-gradient(90deg, rgba(79, 110, 247, .04)1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 16px;
            flex-wrap: wrap
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 24px rgba(79, 110, 247, .4);
            flex-shrink: 0
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -.5px;
            line-height: 1.2
        }

        h1 span {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: .5px;
            margin-top: 2px;
            font-family: 'Manrope', sans-serif
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 28px
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: border-color .2s
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity .2s
        }

        .stat-card:hover {
            border-color: var(--accent)
        }

        .stat-card:hover::before {
            opacity: 1
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 8px
        }

        .stat-value {
            font-family: 'Unbounded', sans-serif;
            font-size: 26px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all .2s;
            white-space: nowrap
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 20px rgba(79, 110, 247, .35)
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(79, 110, 247, .5)
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border)
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .btn-secondary:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .search-wrap {
            flex: 1;
            min-width: 200px;
            position: relative
        }

        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none
        }

        input[type=search] {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px 10px 38px;
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color .2s
        }

        input[type=search]:focus {
            border-color: var(--accent)
        }

        input[type=search]::placeholder {
            color: var(--muted)
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
            display: none
        }

        .progress-bar.active {
            display: block
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--green));
            background-size: 200% 100%;
            border-radius: 2px;
            width: 0%;
            transition: width .4s ease;
            animation: shimmer 1.5s infinite
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%
            }

            100% {
                background-position: 200% 50%
            }
        }

        .status {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none
        }

        .status.info {
            display: block;
            background: rgba(79, 110, 247, .1);
            border: 1px solid rgba(79, 110, 247, .3);
            color: #a5b4fc
        }

        .status.error {
            display: block;
            background: rgba(244, 63, 94, .1);
            border: 1px solid rgba(244, 63, 94, .3);
            color: #fda4af
        }

        .status.success {
            display: block;
            background: rgba(34, 211, 163, .1);
            border: 1px solid rgba(34, 211, 163, .3);
            color: #6ee7b7
        }

        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: none
        }

        .table-wrap.visible {
            display: block
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-wrap: wrap
        }

        .table-title {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .5px
        }

        .badge {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Unbounded', sans-serif
        }

        .table-scroll {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        thead th {
            background: var(--surface2);
            padding: 12px 16px;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--muted);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color .2s;
            position: sticky;
            top: 0;
            z-index: 10
        }

        thead th:hover {
            color: var(--accent)
        }

        thead th.sorted {
            color: var(--accent)
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s
        }

        tbody tr:last-child {
            border-bottom: none
        }

        tbody tr:hover {
            background: rgba(79, 110, 247, .05)
        }

        tbody td {
            padding: 11px 16px;
            vertical-align: middle;
            max-width: 220px
        }

        .id-cell {
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap
        }

        .name-cell {
            font-weight: 600;
            white-space: nowrap
        }

        .email-cell {
            color: #93c5fd;
            font-size: 12px
        }

        .phone-cell {
            color: var(--green);
            font-size: 12px;
            white-space: nowrap
        }

        .status-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: .3px
        }

        .pill-new {
            background: rgba(79, 110, 247, .15);
            color: #a5b4fc;
            border: 1px solid rgba(79, 110, 247, .25)
        }

        .pill-active {
            background: rgba(34, 211, 163, .12);
            color: #6ee7b7;
            border: 1px solid rgba(34, 211, 163, .25)
        }

        .pill-closed {
            background: rgba(244, 63, 94, .1);
            color: #fda4af;
            border: 1px solid rgba(244, 63, 94, .2)
        }

        .pill-default {
            background: rgba(107, 114, 128, .15);
            color: #9ca3af;
            border: 1px solid rgba(107, 114, 128, .2)
        }

        .date-cell {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap
        }

        .dup-icon {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--yellow);
            margin-right: 6px;
            vertical-align: middle
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--muted);
            flex-wrap: wrap;
            gap: 8px
        }

        .page-btns {
            display: flex;
            gap: 6px
        }

        .page-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            font-size: 12px;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .page-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 700
        }

        .page-btn:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        .dedup-legend {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            background: rgba(251, 191, 36, .04)
        }

        select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 12px;
            font-family: 'Manrope', sans-serif;
            font-size: 12px;
            cursor: pointer;
            outline: none
        }

        select:focus {
            border-color: var(--accent)
        }

        option {
            background: var(--surface2)
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="logo">
                <div class="logo-icon">🎯</div>
                <h1>CRM Лиды<span>KiberOne Kaliningrad · s20.online</span></h1>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
                <button class="btn btn-primary" id="fetchBtn" onclick="startFetch()">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Загрузить лиды
                </button>
                <button class="btn btn-secondary" id="exportBtn" onclick="exportCSV()" disabled>
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Скачать CSV
                </button>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Всего лидов</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Уникальных</div>
                <div class="stat-value" id="statUniq">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Дублей удалено</div>
                <div class="stat-value" id="statDups">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Страниц загружено</div>
                <div class="stat-value" id="statPages">—</div>
            </div>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status" id="statusMsg"></div>

        <div class="controls" id="controlsRow" style="display:none">
            <div class="search-wrap">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="search" id="searchInput" placeholder="Поиск по имени, email, телефону..."
                    oninput="filterLeads()">
            </div>
            <select id="perPage" onchange="renderTable()">
                <option value="25">25 / стр</option>
                <option value="50" selected>50 / стр</option>
                <option value="100">100 / стр</option>
                <option value="9999">Все</option>
            </select>
        </div>

        <div class="table-wrap" id="tableWrap">
            <div class="table-header">
                <span class="table-title">БАЗА ЛИДОВ <span class="badge" id="countBadge">0</span></span>
                <span style="font-size:12px;color:var(--muted)" id="dupInfo"></span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortBy('id',this)">ID</th>
                            <th onclick="sortBy('name',this)">Имя</th>
                            <th onclick="sortBy('email',this)">E-mail</th>
                            <th onclick="sortBy('phone',this)">Телефон</th>
                            <th onclick="sortBy('status',this)">Статус</th>
                            <th onclick="sortBy('source',this)">Источник</th>
                            <th onclick="sortBy('date',this)" class="sorted">Дата ↓</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="dedup-legend" id="dupLegend" style="display:none">
                <span class="dup-icon"></span>
                <span>Жёлтая точка — был дублирующий лид (удалён, оставлен новейший)</span>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let allLeads = [], filteredLeads = [], removedDups = 0, sortField = 'date', sortDir = -1, currentPage = 1;

        async function startFetch() {
            const btn = document.getElementById('fetchBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Загрузка...';
            showStatus('Подключаемся к CRM...', 'info');
            showProgress(5);
            try {
                const raw = await fetchAll();
                showProgress(80);
                showStatus(`Получено ${raw.length} лидов. Дедупликация...`, 'info');
                const c = dedup(raw);
                allLeads = c.leads; removedDups = c.removed;
                showProgress(100);
                setTimeout(() => hideProgress(), 500);
                document.getElementById('statTotal').textContent = raw.length.toLocaleString('ru');
                document.getElementById('statUniq').textContent = allLeads.length.toLocaleString('ru');
                document.getElementById('statDups').textContent = removedDups.toLocaleString('ru');
                filterLeads();
                document.getElementById('tableWrap').classList.add('visible');
                document.getElementById('controlsRow').style.display = 'flex';
                document.getElementById('exportBtn').disabled = false;
                if (removedDups > 0) {
                    document.getElementById('dupLegend').style.display = 'flex';
                    document.getElementById('dupInfo').textContent = 'Удалено дублей: ' + removedDups;
                }
                showStatus(`✅ Готово! ${allLeads.length} уникальных лидов` + (removedDups ? ` (удалено ${removedDups} дублей)` : ' — дублей нет'), 'success');
            } catch (e) {
                showStatus('❌ ' + e.message, 'error');
                hideProgress();
            }
            btn.disabled = false;
            btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Обновить';
        }

        async function fetchAll() {
            let page = 0, leads = [], hasMore = true, p = 0;
            while (hasMore) {
                const r = await fetch(`/api/leads?page=${page}`);
                if (!r.ok) { const t = await r.text(); throw new Error(t || `HTTP ${r.status}`); }
                const j = await r.json();
                if (j.error) throw new Error(j.error);
                leads = leads.concat(j.items || []);
                p++;
                document.getElementById('statPages').textContent = p;
                showStatus(`Страниц: ${p}, лидов: ${leads.length}...`, 'info');
                showProgress(10 + Math.min(65, p * 12));
                hasMore = j.hasMore;
                page++;
            }
            return leads;
        }

        function normalPhone(p) { if (!p) return null; const d = p.replace(/\D/g, ''); return d.length >= 7 ? d.slice(-10) : null; }
        function normalEmail(e) { return e ? e.trim().toLowerCase() : null; }
        function gName(l) { return l.name || l.clientName || (l.firstName || l.lastName ? `${l.firstName || ''} ${l.lastName || ''}`.trim() : null) || (l.client ? (l.client.name || l.client.surname ? `${l.client.name || ''} ${l.client.surname || ''}`.trim() : null) : null) || `Лид #${l.id}`; }
        function gEmail(l) { return l.email || l.clientEmail || (l.emails && l.emails[0] && (l.emails[0].value || l.emails[0])) || (l.client && l.client.email) || null; }
        function gPhone(l) { return l.phone || l.clientPhone || (l.phones && l.phones[0] && (l.phones[0].value || l.phones[0])) || (l.client && l.client.phone) || null; }
        function gStatus(l) { return l.statusName || l.status || l.leadStatus || '—'; }
        function gSource(l) { return l.sourceName || l.source || l.referrer || '—'; }
        function gDate(l) { return l.createdAt || l.dateAdd || l.date || l.updatedAt || ''; }

        function dedup(leads) {
            const sorted = [...leads].sort((a, b) => new Date(gDate(b) || 0) - new Date(gDate(a) || 0));
            const sp = new Map(), se = new Map(), result = [];
            let removed = 0; const dupIds = new Set();
            for (const l of sorted) {
                const ph = normalPhone(gPhone(l)), em = normalEmail(gEmail(l));
                let dup = false;
                if (ph && sp.has(ph)) { dup = true; dupIds.add(sp.get(ph)); }
                if (em && se.has(em)) { dup = true; dupIds.add(se.get(em)); }
                if (!dup) { if (ph) sp.set(ph, l.id); if (em) se.set(em, l.id); result.push(l); }
                else removed++;
            }
            result.forEach(l => l._wasDuped = dupIds.has(l.id));
            return { leads: result, removed };
        }

        function filterLeads() {
            const q = (document.getElementById('searchInput').value || '').toLowerCase();
            currentPage = 1;
            filteredLeads = q ? allLeads.filter(l => gName(l).toLowerCase().includes(q) || (gEmail(l) || '').toLowerCase().includes(q) || (gPhone(l) || '').includes(q)) : [...allLeads];
            sortLeads(); renderTable();
        }

        function sortBy(f, th) {
            if (sortField === f) sortDir *= -1; else { sortField = f; sortDir = 1; }
            document.querySelectorAll('thead th').forEach(t => { t.classList.remove('sorted'); t.textContent = t.textContent.replace(/ [↑↓]/, ''); });
            th.classList.add('sorted'); th.textContent += ' ' + (sortDir > 0 ? '↑' : '↓');
            currentPage = 1; sortLeads(); renderTable();
        }

        function sortLeads() {
            filteredLeads.sort((a, b) => {
                let va, vb;
                const m = { id: (x) => +(x.id || 0), name: gName, email: (x) => gEmail(x) || '', phone: (x) => gPhone(x) || '', status: gStatus, source: gSource, date: (x) => gDate(x) || '' };
                va = (m[sortField] || m.date)(a); vb = (m[sortField] || m.date)(b);
                return va < vb ? -sortDir : va > vb ? sortDir : 0;
            });
        }

        function statusCls(s) {
            const v = (s || '').toLowerCase();
            if (v.includes('нов') || v.includes('new')) return 'pill-new';
            if (v.includes('акт') || v.includes('active') || v.includes('обраб')) return 'pill-active';
            if (v.includes('закр') || v.includes('close') || v.includes('отказ')) return 'pill-closed';
            return 'pill-default';
        }
        function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return isNaN(dt) ? d : dt.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        function renderTable() {
            const pp = parseInt(document.getElementById('perPage').value);
            const page = filteredLeads.slice((currentPage - 1) * pp, currentPage * pp);
            document.getElementById('countBadge').textContent = filteredLeads.length;
            const tbody = document.getElementById('tableBody');
            if (!filteredLeads.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Ничего не найдено</td></tr>'; document.getElementById('pagination').innerHTML = ''; return; }
            tbody.innerHTML = page.map(l => {
                const em = gEmail(l), ph = gPhone(l), st = gStatus(l);
                return `<tr>
      <td class="id-cell">${esc(l.id || '—')}</td>
      <td class="name-cell">${l._wasDuped ? '<span class="dup-icon" title="Был дубль"></span>' : ''}${esc(gName(l))}</td>
      <td class="email-cell">${em ? `<a href="mailto:${esc(em)}" style="color:inherit;text-decoration:none">${esc(em)}</a>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td class="phone-cell">${ph ? esc(ph) : '<span style="color:var(--muted)">—</span>'}</td>
      <td><span class="status-pill ${statusCls(st)}">${esc(st)}</span></td>
      <td style="color:var(--muted);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(gSource(l))}</td>
      <td class="date-cell">${fmtDate(gDate(l))}</td>
    </tr>`;
            }).join('');
            renderPagination(filteredLeads.length, pp);
        }

        function renderPagination(total, pp) {
            const totalP = Math.ceil(total / pp), el = document.getElementById('pagination');
            if (totalP <= 1) { el.innerHTML = `<span>${total} записей</span>`; return; }
            const s = (currentPage - 1) * pp + 1, e = Math.min(currentPage * pp, total);
            let pages = '';
            for (let i = 1; i <= totalP; i++) {
                if (i === 1 || i === totalP || Math.abs(i - currentPage) <= 2) pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
                else if (Math.abs(i - currentPage) === 3) pages += `<span style="color:var(--muted);padding:0 4px">…</span>`;
            }
            el.innerHTML = `<span>${s}–${e} из ${total}</span><div class="page-btns"><button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>${pages}<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalP ? 'disabled' : ''}>›</button></div>`;
        }

        function goPage(p) {
            const pp = parseInt(document.getElementById('perPage').value);
            const tp = Math.ceil(filteredLeads.length / pp);
            if (p < 1 || p > tp) return;
            currentPage = p; renderTable();
            document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function exportCSV() {
            const rows = [['ID', 'Имя', 'Email', 'Телефон', 'Статус', 'Источник', 'Дата']];
            for (const l of filteredLeads) rows.push([l.id || '', gName(l), gEmail(l) || '', gPhone(l) || '', gStatus(l), gSource(l), gDate(l) ? new Date(gDate(l)).toLocaleDateString('ru-RU') : '']);
            const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\r\n');
            const b = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `crm_leads_${new Date().toLocaleDateString('ru-RU').replace(/\./g, '-')}.csv`; a.click();
        }

        function showStatus(m, t) { const e = document.getElementById('statusMsg'); e.className = 'status ' + t; e.textContent = m; }
        function showProgress(p) { document.getElementById('progressBar').classList.add('active'); document.getElementById('progressFill').style.width = p + '%'; }
        function hideProgress() { document.getElementById('progressBar').classList.remove('active'); document.getElementById('progressFill').style.width = '0%'; }
    </script>
</body>

</html>
